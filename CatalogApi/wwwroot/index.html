<!DOCTYPE html>
<html>
<head>
    <title>Каталог товаров</title>
    <meta charset="utf-8">
</head>
<body>
    <h1>Управление каталогом товаров</h1>
    <h3>Добавить новый товар</h3>
    <input type="text" id="name" placeholder="Название">
    <input type="number" id="price" placeholder="Цена" step="0.01">
    <input type="text" id="category" placeholder="Категория">
    <textarea id="description" placeholder="Описание"></textarea>
    <input type="number" id="stockCount" placeholder="Количество на складе">
    <button id="addBtn">Добавить товар</button>

    <h3>Список товаров</h3>
    <table border="1">
        <thead><tr><th>Название</th><th>Цена</th><th>Категория</th><th>Остаток</th><th>Статус</th><th>Действия</th></tr></thead>
        <tbody id="productsBody"><tr><td colspan="6">Загрузка...</td></tr></tbody>
    </table>
    <script src="app.js"></script>
</body>
</html>
